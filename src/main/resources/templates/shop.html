<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Shop')}"></head>
<body>
<div th:replace="~{fragments/layout :: layout(~{::section})}">
    <section>
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="fw-bold mb-0"><i class="bi bi-shop me-2 text-primary"></i>Product Shop</h4>
        </div>

        <div th:if="${param.error}" class="alert alert-danger mb-4">
            <i class="bi bi-exclamation-triangle-fill me-2"></i>
            Unable to complete purchase. Insufficient stock or product not found.
        </div>

        <div class="row g-4">
            <div class="col-xl-4 col-md-6" th:each="p : ${products}">
                <div class="card border-0 shadow-sm h-100 product-card">
                    <div class="card-body d-flex flex-column">
                        <div class="product-icon mb-3">
                            <i class="bi bi-box-seam fs-1 text-primary"></i>
                        </div>
                        <h5 class="fw-bold" th:text="${p.name}">Product Name</h5>
                        <p class="text-muted small flex-grow-1" th:text="${p.description}">Description</p>
                        <div class="d-flex justify-content-between align-items-center mt-3">
                            <span class="fs-4 fw-bold text-primary" th:text="'$' + ${#numbers.formatDecimal(p.price, 1, 2)}">$0.00</span>
                            <span th:class="'badge ' + (${p.stock > 10} ? 'bg-success' : (${p.stock > 0} ? 'bg-warning' : 'bg-danger'))"
                                  th:text="${p.stock > 0} ? ${p.stock} + ' in stock' : 'Out of stock'"></span>
                        </div>
                        <a th:href="@{/shop/buy(id=${p.id})}"
                           class="btn btn-primary mt-3"
                           th:classappend="${p.stock == 0} ? ' disabled' : ''">
                            <i class="bi bi-cart-plus me-1"></i>Buy Now
                        </a>
                    </div>
                </div>
            </div>
            <div class="col-12" th:if="${#lists.isEmpty(products)}">
                <div class="text-center text-muted py-5">
                    <i class="bi bi-inbox fs-1 d-block mb-3"></i>
                    <p>No products available at the moment.</p>
                </div>
            </div>
        </div>
    </section>
</div>
</body>
</html>
