<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Customer List</title>

    <style>
        body {
            font-family: Arial, sans-serif;
        }

        table {
            border-collapse: collapse;
            width: 90%;
        }

        th, td {
            border: 1px solid #444;
            padding: 8px;
            text-align: left;
        }

        th {
            background-color: #eee;
        }

        a {
            text-decoration: none;
            color: blue;
            margin-right: 8px;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<h2>Customer List</h2>

<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>First Name</th>
        <th>Last Name</th>
        <th>Email</th>
        <th>Status</th>
        <th>Manager</th>
        <th>Actions</th>
    </tr>
    </thead>

    <tbody>
    <tr th:each="c : ${customers}">
        <td th:text="${c.id}"></td>
        <td th:text="${c.firstName}"></td>
        <td th:text="${c.lastName}"></td>
        <td th:text="${c.email}"></td>
        <td th:text="${c.status}"></td>

        <!-- NULL SAFE MANAGER -->
        <td th:text="${c.manager != null ? c.manager.name : 'Not Assigned'}"></td>

        <!-- ACTIONS -->
        <td>
            <a th:href="@{/customers/edit(id=${c.id})}">
                Edit
            </a>

            <a th:href="@{/customers/delete(id=${c.id})}"
               onclick="return confirm('Are you sure you want to delete this customer?')">
                Delete
            </a>
        </td>
    </tr>
    </tbody>
</table>

<br>

<a href="/customers/add">➕ Add New Customer</a>

</body>
</html>
