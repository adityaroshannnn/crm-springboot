<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' | CRM System'">CRM System</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:fragment="layout(content)">
    <!-- Sidebar -->
    <nav class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <i class="bi bi-grid-3x3-gap-fill me-2"></i>
            <span class="fw-bold">CRM System</span>
        </div>
        <ul class="sidebar-nav">
            <sec:authorize access="hasRole('ADMIN')">
                <li>
                    <a th:href="@{/dashboard}" th:classappend="${#httpServletRequest.requestURI == '/dashboard'} ? 'active'">
                        <i class="bi bi-speedometer2"></i> Dashboard
                    </a>
                </li>
                <li>
                    <a th:href="@{/customers}" th:classappend="${#httpServletRequest.requestURI.startsWith('/customers')} ? 'active'">
                        <i class="bi bi-people"></i> Customers
                    </a>
                </li>
                <li>
                    <a th:href="@{/managers}" th:classappend="${#httpServletRequest.requestURI.startsWith('/managers')} ? 'active'">
                        <i class="bi bi-person-badge"></i> Managers
                    </a>
                </li>
                <li>
                    <a th:href="@{/products}" th:classappend="${#httpServletRequest.requestURI.startsWith('/products')} ? 'active'">
                        <i class="bi bi-box-seam"></i> Products
                    </a>
                </li>
                <li>
                    <a th:href="@{/orders}" th:classappend="${#httpServletRequest.requestURI.startsWith('/orders')} ? 'active'">
                        <i class="bi bi-receipt"></i> Orders
                    </a>
                </li>
            </sec:authorize>
            <sec:authorize access="hasRole('CUSTOMER')">
                <li>
                    <a th:href="@{/shop}" th:classappend="${#httpServletRequest.requestURI.startsWith('/shop')} ? 'active'">
                        <i class="bi bi-shop"></i> Shop
                    </a>
                </li>
                <li>
                    <a th:href="@{/my-orders}" th:classappend="${#httpServletRequest.requestURI.startsWith('/my-orders')} ? 'active'">
                        <i class="bi bi-bag-check"></i> My Orders
                    </a>
                </li>
            </sec:authorize>
        </ul>
        <div class="sidebar-footer">
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="btn-logout">
                    <i class="bi bi-box-arrow-left"></i> Logout
                </button>
            </form>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="main-content">
        <!-- Top Navbar -->
        <header class="top-navbar">
            <button class="btn btn-link sidebar-toggle" id="sidebarToggle">
                <i class="bi bi-list fs-4"></i>
            </button>
            <div class="navbar-info ms-auto d-flex align-items-center gap-3">
                <span class="text-muted small">
                    <i class="bi bi-person-circle me-1"></i>
                    <sec:authentication property="name"/>
                    <span class="badge bg-primary ms-1">
                        <sec:authorize access="hasRole('ADMIN')">Admin</sec:authorize>
                        <sec:authorize access="hasRole('CUSTOMER')">Customer</sec:authorize>
                    </span>
                </span>
            </div>
        </header>

        <!-- Page Content -->
        <div class="page-content">
            <th:block th:replace="${content}"/>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
