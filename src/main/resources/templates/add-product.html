<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Add Product')}"></head>
<body>
<div th:replace="~{fragments/layout :: layout(~{::section})}">
    <section>
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="fw-bold mb-0">
                <i class="bi bi-box-seam me-2 text-success"></i>
                <span th:text="${product.id != null} ? 'Edit Product' : 'Add Product'">Add Product</span>
            </h4>
            <a th:href="@{/products}" class="btn btn-outline-secondary">
                <i class="bi bi-arrow-left me-1"></i>Back to List
            </a>
        </div>

        <div class="card border-0 shadow-sm">
            <div class="card-body p-4">
                <form th:action="@{/products/save}" th:object="${product}" method="post">
                    <input type="hidden" th:field="*{id}">

                    <div class="row g-3">
                        <div class="col-md-8">
                            <label class="form-label fw-semibold">Product Name</label>
                            <input type="text" class="form-control" th:field="*{name}" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-semibold">Price ($)</label>
                            <input type="number" step="0.01" min="0" class="form-control" th:field="*{price}" required>
                        </div>
                        <div class="col-md-8">
                            <label class="form-label fw-semibold">Description</label>
                            <textarea class="form-control" th:field="*{description}" rows="3"></textarea>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label fw-semibold">Stock</label>
                            <input type="number" min="0" class="form-control" th:field="*{stock}" required>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label fw-semibold">Active</label>
                            <div class="form-check mt-2">
                                <input class="form-check-input" type="checkbox" th:field="*{active}" id="active">
                                <label class="form-check-label" for="active">Active</label>
                            </div>
                        </div>
                        <div class="col-12 mt-3">
                            <button type="submit" class="btn btn-success">
                                <i class="bi bi-check-circle me-1"></i>Save Product
                            </button>
                            <a th:href="@{/products}" class="btn btn-light ms-2">Cancel</a>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </section>
</div>
</body>
</html>
