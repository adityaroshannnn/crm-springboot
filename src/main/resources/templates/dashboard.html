<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Dashboard')}"></head>
<body>
<div th:replace="~{fragments/layout :: layout(~{::section})}">
    <section>
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="fw-bold mb-0"><i class="bi bi-speedometer2 me-2 text-primary"></i>Dashboard</h4>
            <span class="text-muted small">Overview of your CRM</span>
        </div>

        <div class="row g-4 mb-4">
            <!-- Customers Card -->
            <div class="col-xl-3 col-md-6">
                <div class="stat-card card border-0 shadow-sm h-100">
                    <div class="card-body d-flex align-items-center gap-3">
                        <div class="stat-icon bg-primary bg-opacity-10 text-primary">
                            <i class="bi bi-people-fill fs-4"></i>
                        </div>
                        <div>
                            <div class="text-muted small fw-semibold text-uppercase">Total Customers</div>
                            <div class="fs-2 fw-bold" th:text="${totalCustomers}">0</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Products Card -->
            <div class="col-xl-3 col-md-6">
                <div class="stat-card card border-0 shadow-sm h-100">
                    <div class="card-body d-flex align-items-center gap-3">
                        <div class="stat-icon bg-success bg-opacity-10 text-success">
                            <i class="bi bi-box-seam-fill fs-4"></i>
                        </div>
                        <div>
                            <div class="text-muted small fw-semibold text-uppercase">Total Products</div>
                            <div class="fs-2 fw-bold" th:text="${totalProducts}">0</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Orders Card -->
            <div class="col-xl-3 col-md-6">
                <div class="stat-card card border-0 shadow-sm h-100">
                    <div class="card-body d-flex align-items-center gap-3">
                        <div class="stat-icon bg-warning bg-opacity-10 text-warning">
                            <i class="bi bi-receipt-cutoff fs-4"></i>
                        </div>
                        <div>
                            <div class="text-muted small fw-semibold text-uppercase">Total Orders</div>
                            <div class="fs-2 fw-bold" th:text="${totalOrders}">0</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Revenue Card -->
            <div class="col-xl-3 col-md-6">
                <div class="stat-card card border-0 shadow-sm h-100">
                    <div class="card-body d-flex align-items-center gap-3">
                        <div class="stat-icon bg-danger bg-opacity-10 text-danger">
                            <i class="bi bi-currency-dollar fs-4"></i>
                        </div>
                        <div>
                            <div class="text-muted small fw-semibold text-uppercase">Total Revenue</div>
                            <div class="fs-2 fw-bold" th:text="'$' + ${#numbers.formatDecimal(totalRevenue, 1, 2)}">$0</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Quick Links -->
        <div class="row g-4">
            <div class="col-md-4">
                <div class="card border-0 shadow-sm">
                    <div class="card-body text-center py-4">
                        <i class="bi bi-people fs-1 text-primary mb-3 d-block"></i>
                        <h6 class="fw-semibold">Manage Customers</h6>
                        <a th:href="@{/customers}" class="btn btn-outline-primary btn-sm mt-2">View All</a>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card border-0 shadow-sm">
                    <div class="card-body text-center py-4">
                        <i class="bi bi-box-seam fs-1 text-success mb-3 d-block"></i>
                        <h6 class="fw-semibold">Manage Products</h6>
                        <a th:href="@{/products}" class="btn btn-outline-success btn-sm mt-2">View All</a>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card border-0 shadow-sm">
                    <div class="card-body text-center py-4">
                        <i class="bi bi-receipt fs-1 text-warning mb-3 d-block"></i>
                        <h6 class="fw-semibold">View Orders</h6>
                        <a th:href="@{/orders}" class="btn btn-outline-warning btn-sm mt-2">View All</a>
                    </div>
                </div>
            </div>
        </div>
    </section>
</div>
</body>
</html>
