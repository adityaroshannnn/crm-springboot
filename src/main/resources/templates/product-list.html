<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Products')}"></head>
<body>
<div th:replace="~{fragments/layout :: layout(~{::section})}">
    <section>
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="fw-bold mb-0"><i class="bi bi-box-seam me-2 text-success"></i>Products</h4>
            <a th:href="@{/products/add}" class="btn btn-success">
                <i class="bi bi-plus-circle me-1"></i>Add Product
            </a>
        </div>

        <div class="card border-0 shadow-sm">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead class="table-light">
                        <tr>
                            <th>#</th>
                            <th>Name</th>
                            <th>Description</th>
                            <th>Price</th>
                            <th>Stock</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="p : ${products}">
                            <td th:text="${p.id}"></td>
                            <td th:text="${p.name}" class="fw-semibold"></td>
                            <td th:text="${p.description}" class="text-muted small"></td>
                            <td th:text="'$' + ${#numbers.formatDecimal(p.price, 1, 2)}"></td>
                            <td>
                                <span th:class="'badge ' + (${p.stock > 10} ? 'bg-success' : (${p.stock > 0} ? 'bg-warning' : 'bg-danger'))"
                                      th:text="${p.stock} + ' in stock'"></span>
                            </td>
                            <td>
                                <span th:class="'badge ' + (${p.active} ? 'bg-success' : 'bg-secondary')"
                                      th:text="${p.active} ? 'Active' : 'Inactive'"></span>
                            </td>
                            <td>
                                <a th:href="@{/products/edit(id=${p.id})}" class="btn btn-sm btn-outline-primary me-1">
                                    <i class="bi bi-pencil"></i>
                                </a>
                                <a th:href="@{/products/delete(id=${p.id})}" class="btn btn-sm btn-outline-danger"
                                   onclick="return confirmDelete()">
                                    <i class="bi bi-trash"></i>
                                </a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(products)}">
                            <td colspan="7" class="text-center text-muted py-4">
                                <i class="bi bi-inbox fs-4 d-block mb-2"></i>No products found
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </section>
</div>
</body>
</html>
