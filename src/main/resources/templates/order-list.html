<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Orders')}"></head>
<body>
<div th:replace="~{fragments/layout :: layout(~{::section})}">
    <section>
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="fw-bold mb-0"><i class="bi bi-receipt me-2 text-warning"></i>All Orders</h4>
        </div>

        <div class="card border-0 shadow-sm">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead class="table-light">
                        <tr>
                            <th>#</th>
                            <th>Customer</th>
                            <th>Product</th>
                            <th>Qty</th>
                            <th>Total</th>
                            <th>Status</th>
                            <th>Date</th>
                            <th>Actions</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="o : ${orders}">
                            <td th:text="${o.id}"></td>
                            <td th:text="${o.customer != null ? o.customer.firstName + ' ' + o.customer.lastName : 'N/A'}"></td>
                            <td th:text="${o.product != null ? o.product.name : 'N/A'}"></td>
                            <td th:text="${o.quantity}"></td>
                            <td th:text="'$' + ${#numbers.formatDecimal(o.totalPrice, 1, 2)}"></td>
                            <td>
                                <span th:class="'badge ' + (${o.status.name() == 'PURCHASED'} ? 'bg-success' : (${o.status.name() == 'REFUND_REQUESTED'} ? 'bg-warning' : 'bg-secondary'))"
                                      th:text="${o.status}"></span>
                            </td>
                            <td th:text="${#temporals.format(o.createdAt, 'dd MMM yyyy')}"></td>
                            <td>
                                <form th:if="${o.status.name() == 'REFUND_REQUESTED'}"
                                      th:action="@{/orders/approve-refund}" method="post" class="d-inline">
                                    <input type="hidden" name="id" th:value="${o.id}">
                                    <button type="submit" class="btn btn-sm btn-outline-warning">
                                        <i class="bi bi-check-circle me-1"></i>Approve Refund
                                    </button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(orders)}">
                            <td colspan="8" class="text-center text-muted py-4">
                                <i class="bi bi-inbox fs-4 d-block mb-2"></i>No orders found
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </section>
</div>
</body>
</html>
