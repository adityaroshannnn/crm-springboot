<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error | CRM System</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; }
    </style>
</head>
<body>
    <div class="min-vh-100 d-flex align-items-center justify-content-center">
        <div class="text-center p-5">
            <i class="bi bi-exclamation-triangle-fill text-danger" style="font-size: 5rem;"></i>
            <h1 class="mt-4 fw-bold text-dark">Oops! Something went wrong.</h1>
            <p class="text-muted fs-5 mt-2">An unexpected error occurred. Please try again.</p>
            <a href="/dashboard" class="btn btn-primary me-2 mt-3">
                <i class="bi bi-house me-1"></i>Go to Dashboard
            </a>
            <a href="/login" class="btn btn-outline-secondary mt-3">
                <i class="bi bi-box-arrow-in-right me-1"></i>Back to Login
            </a>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
